name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API test dependencies
        run: python -m pip install "fastapi>=0.115,<1.0" "httpx>=0.27,<1.0" "pytest>=8.0,<9.0"
      - name: Run unit and API tests
        run: python -m pytest -q
